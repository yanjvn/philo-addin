<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script>
    Office.onReady(() => {});
    function openTaskpane(event) {
      Office.addin.showAsTaskpane();
      event.completed();
    }
    Office.actions.associate("openTaskpane", openTaskpane);
  </script>
</head>
<body></body>
</html>
